services:
  - type: worker
    name: affiliate-reel-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: commit
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_BUSINESS_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AMAZON_AFFILIATE_TAG
        value: metechs-21
      - key: WEBSITE_API_URL
        value: https://metechs-store.vercel.app/api/products/public
      - key: WEBSITE_API_KEY
        sync: false
      # YouTube OAuth2 — custom Google Cloud credentials (required; plugin's built-in
      # client was revoked by Google in late 2024).
      # See README for the one-time setup steps.
      - key: YOUTUBE_OAUTH2_CLIENT_ID
        sync: false
      - key: YOUTUBE_OAUTH2_CLIENT_SECRET
        sync: false
      # base64(access_token_data.json) produced after running the auth flow once locally.
      - key: YOUTUBE_OAUTH2_TOKEN
        sync: false
