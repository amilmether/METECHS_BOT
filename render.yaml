services:
  - type: worker
    name: affiliate-reel-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: commit
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_BUSINESS_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AMAZON_AFFILIATE_TAG
        value: metechs-21
      - key: WEBSITE_API_URL
        value: https://metechs-store.vercel.app/api/products/public
      - key: WEBSITE_API_KEY
        sync: false
      # Optional: set to the container path of a Netscape cookies.txt if iOS/Android
      # player clients are ever blocked. Leave unset to rely on mobile clients only.
      - key: YOUTUBE_COOKIES_FILE
        sync: false
      # Preferred alternative to YOUTUBE_COOKIES_FILE for Render:
      # base64-encode your cookies.txt and paste the result here.
      # Generate with:  base64 -w 0 cookies.txt
      - key: YOUTUBE_COOKIES_B64
        sync: false
